<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CizaHealth+ | Pharmacy ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
--blue:#123c8a;
--blue-dark:#0b2c66;
--green:#2e7d32;
--red:#c62828;
--orange:#ef6c00;
--gray:#6b7a90;
--bg:#f4f7fb;
--radius:18px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:var(--bg);
}

.app{
max-width:1200px;
margin:auto;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

header{
background:linear-gradient(90deg,var(--blue),var(--blue-dark));
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header-left{
display:flex;
align-items:center;
gap:14px;
}

.logo{
font-size:22px;
font-weight:700;
}

.logo span{
color:#3ccf91;
}

.erp-title{
font-weight:500;
opacity:.9;
}

.logout{
background:white;
color:var(--blue-dark);
border:none;
padding:8px 14px;
border-radius:12px;
font-weight:600;
cursor:pointer;
}

/* PHARMACY INFO */

.pharmacy-info{
background:white;
padding:20px;
border-radius:var(--radius);
margin-bottom:20px;
box-shadow:0 8px 25px rgba(0,0,0,.05);
}

.content{
padding:20px;
}

/* KPI */

.kpi-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:14px;
margin-bottom:20px;
}

.kpi{
background:white;
padding:16px;
border-radius:var(--radius);
box-shadow:0 10px 25px rgba(0,0,0,.05);
text-align:center;
border-top:4px solid var(--blue);
}

.kpi h3{
margin:0;
font-size:20px;
}

.kpi small{
color:var(--gray);
}

/* CARDS */

.card{
background:white;
padding:18px;
border-radius:var(--radius);
margin-bottom:18px;
box-shadow:0 10px 30px rgba(0,0,0,.05);
}

input{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid #e6ebf5;
margin-top:10px;
}

button{
margin-top:10px;
padding:12px;
border:none;
border-radius:14px;
background:var(--blue);
color:white;
font-weight:600;
cursor:pointer;
}

button.secondary{
background:#eef3fb;
color:var(--blue);
}

button.danger{
background:var(--red);
}

.success{color:var(--green)}
.error{color:var(--red)}

.footer{
margin-top:auto;
text-align:center;
padding:18px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="app">

<header>

<div class="header-left">

<div class="logo">
CizaHealth<span>+</span>
</div>

<div class="erp-title">
Pharmacy ERP
</div>

</div>

<button class="logout" id="logoutBtn">
Déconnexion
</button>

</header>

<div class="content">

<div class="pharmacy-info">

<h2 id="pharmacyName">Pharmacie</h2>
<div id="pharmacyCountry"></div>

</div>

<div class="kpi-grid">

<div class="kpi">
<h3 id="kpiPending">0</h3>
<small>En attente</small>
</div>

<div class="kpi">
<h3 id="kpiDispensed">0</h3>
<small>Délivrées</small>
</div>

<div class="kpi">
<h3 id="kpiRejected">0</h3>
<small>Refusées</small>
</div>

<div class="kpi">
<h3 id="kpiUnavailable">0</h3>
<small>Indisponible</small>
</div>

<div class="kpi">
<h3 id="kpiTotal">0</h3>
<small>Total traitées</small>
</div>

<div class="kpi">
<h3 id="kpiRate">0%</h3>
<small>Taux validation</small>
</div>

</div>

<div class="card">

<h3>Scanner ordonnance</h3>

<input id="manualCode" placeholder="Scanner ou entrer code RX">

<button id="validateBtn">Valider ordonnance</button>

<div id="result"></div>

</div>

<div class="card">

<h3>Ordonnances en attente</h3>

<div id="pendingList"></div>

</div>

</div>

<div class="footer">
© 2026 CizaHealth+ — Système hospitalier partenaire
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
collection, query, where, onSnapshot,
doc, getDoc, updateDoc, serverTimestamp, getDocs
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const logoutBtn = document.getElementById("logoutBtn");

logoutBtn.onclick = async()=>{
await signOut(auth);
location.href="login.html";
};

let currentUser;

onAuthStateChanged(auth, async(user)=>{

if(!user){
location.href="login.html";
return;
}

currentUser = user;

const snap = await getDoc(doc(db,"users",user.uid));

if(!snap.exists()) return;

const data = snap.data();

document.getElementById("pharmacyName").innerText =
data.fullName || "Pharmacie";

if(data.country==="Rwanda"){
document.getElementById("pharmacyCountry").innerText =
"🇷🇼 Rwanda";
}else{
document.getElementById("pharmacyCountry").innerText =
"🇧🇮 Burundi";
}

loadKPI();
listenPending();

});

function loadKPI(){

const q = query(
collection(db,"prescriptions"),
where("assignedPharmacyUid","==",currentUser.uid)
);

onSnapshot(q,(snap)=>{

let pending=0;
let dispensed=0;
let rejected=0;
let unavailable=0;

snap.forEach(docu=>{

const d = docu.data();

if(d.status==="sent") pending++;
if(d.status==="dispensed") dispensed++;
if(d.status==="rejected") rejected++;
if(d.status==="unavailable") unavailable++;

});

const total = dispensed+rejected+unavailable;
const rate = total>0 ? Math.round((dispensed/total)*100) : 0;

document.getElementById("kpiPending").innerText = pending;
document.getElementById("kpiDispensed").innerText = dispensed;
document.getElementById("kpiRejected").innerText = rejected;
document.getElementById("kpiUnavailable").innerText = unavailable;
document.getElementById("kpiTotal").innerText = total;
document.getElementById("kpiRate").innerText = rate+"%";

});

}

function listenPending(){

const q = query(
collection(db,"prescriptions"),
where("assignedPharmacyUid","==",currentUser.uid),
where("status","==","sent")
);

onSnapshot(q,(snap)=>{

const list = document.getElementById("pendingList");
list.innerHTML="";

snap.forEach(docu=>{

const r = docu.data();

list.innerHTML+=`
<div class="card">
<b>${r.code}</b><br>
<small>${r.createdAt?.toDate()?.toLocaleString()||""}</small>
</div>
`;

});

});

}

document.getElementById("validateBtn").onclick = async()=>{

const code =
document.getElementById("manualCode")
.value.trim()
.toUpperCase();

if(!code) return;

const q = query(
collection(db,"prescriptions"),
where("code","==",code),
where("assignedPharmacyUid","==",currentUser.uid),
where("status","==","sent")
);

const snap = await getDocs(q);

const result = document.getElementById("result");

if(snap.empty){
result.innerHTML="<div class='error'>Ordonnance invalide</div>";
return;
}

const docu = snap.docs[0];
const data = docu.data();

let medsHTML="";

(data.medications||[]).forEach(m=>{
medsHTML+=`<b>${m.name}</b><br>${m.dosage} — ${m.posology}<br><br>`;
});

result.innerHTML=`

<div class='success'>Ordonnance valide</div>

${medsHTML}

<button id="dispenseBtn">Confirmer délivrance</button>
<button id="rejectBtn" class="danger">Refuser</button>
<button id="unavailableBtn" class="secondary">Indisponible</button>

`;

document.getElementById("dispenseBtn").onclick = async()=>{

await updateDoc(doc(db,"prescriptions",docu.id),{

status:"dispensed",
used:true,
dispensedAt: serverTimestamp()

});

result.innerHTML="<div class='success'>Ordonnance délivrée</div>";

};

document.getElementById("rejectBtn").onclick = async()=>{

await updateDoc(doc(db,"prescriptions",docu.id),{
status:"rejected"
});

result.innerHTML="<div class='error'>Ordonnance refusée</div>";

};

document.getElementById("unavailableBtn").onclick = async()=>{

await updateDoc(doc(db,"prescriptions",docu.id),{
status:"unavailable"
});

result.innerHTML="<div>Indisponible</div>";

};

};

</script>

</body>
</html>
