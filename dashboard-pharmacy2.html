<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CizaHealth+ | Pharmacy ERP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
--blue:#123c8a;
--blue-dark:#0b2c66;
--green:#2e7d32;
--red:#c62828;
--orange:#ef6c00;
--bg:#f4f7fb;
--radius:16px;
--shadow:0 10px 25px rgba(0,0,0,.08);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:var(--bg);
}

/* HEADER */

header{
background:linear-gradient(90deg,var(--blue),var(--blue-dark));
color:white;
padding:18px 25px;
display:flex;
align-items:center;
justify-content:space-between;
}

.header-left{
display:flex;
align-items:center;
gap:16px;
font-size:20px;
font-weight:600;
}

.logout{
background:white;
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

/* KPI */

.kpi-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:12px;
padding:20px;
}

.kpi{
background:white;
padding:14px;
border-radius:12px;
box-shadow:var(--shadow);
text-align:center;
}

.kpi h3{
margin:0;
font-size:22px;
}

.kpi small{
color:#666;
}

/* LAYOUT */

.main{
display:grid;
grid-template-columns:260px 1fr 320px;
gap:18px;
padding:20px;
}

/* LISTE RX */

.list{
background:white;
border-radius:var(--radius);
box-shadow:var(--shadow);
overflow:hidden;
}

.list h3{
margin:0;
padding:14px;
background:#eef3fb;
}

.rx{
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.rx:hover{
background:#f5f8ff;
}

/* SCAN */

.scan{
background:white;
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:20px;
}

.scan input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:10px;
}

button{
padding:12px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.btn-blue{
background:#2c5bd3;
color:white;
}

.btn-green{
background:#2e7d32;
color:white;
}

.btn-red{
background:#c62828;
color:white;
}

.btn-gray{
background:#eaeef7;
}

/* DETAILS */

.details{
background:white;
border-radius:var(--radius);
box-shadow:var(--shadow);
padding:18px;
}

.details h3{
margin-top:0;
}

.med{
border-bottom:1px solid #eee;
padding:6px 0;
}

</style>
</head>

<body>

<header>

<div class="header-left">
CizaHealth+ | Pharmacy ERP
</div>

<button class="logout" id="logoutBtn">
Déconnexion
</button>

</header>

<!-- KPI -->

<div class="kpi-grid">

<div class="kpi">
<h3 id="kpiPending">0</h3>
<small>En attente</small>
</div>

<div class="kpi">
<h3 id="kpiDispensed">0</h3>
<small>Délivrées</small>
</div>

<div class="kpi">
<h3 id="kpiRejected">0</h3>
<small>Refusées</small>
</div>

<div class="kpi">
<h3 id="kpiUnavailable">0</h3>
<small>Indisponibles</small>
</div>

<div class="kpi">
<h3 id="kpiTotal">0</h3>
<small>Total traitées</small>
</div>

<div class="kpi">
<h3 id="kpiRate">0%</h3>
<small>Taux validation</small>
</div>

<div class="kpi">
<h3 id="kpiDelay">0m</h3>
<small>Délai moyen</small>
</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- LISTE -->

<div class="list">

<h3>Ordonnances en attente</h3>

<div id="rxList"></div>

</div>

<!-- SCAN -->

<div class="scan">

<h3>Scanner ordonnance</h3>

<button class="btn-blue" id="scanBtn">
Scanner QR
</button>

<input id="manualCode" placeholder="Entrer code ordonnance">

<button class="btn-green" id="validateBtn">
Valider ordonnance
</button>

<div id="scanArea" style="margin-top:20px;color:#777">
Début scanner...
</div>

</div>

<!-- DETAILS -->

<div class="details">

<h3>Détails de l’ordonnance</h3>

<div id="detailsContent">
Sélectionner une ordonnance
</div>

</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
onAuthStateChanged,
signOut
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
collection,
query,
where,
onSnapshot,
doc,
updateDoc,
getDocs,
serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let currentUser;
let currentPrescription;

/* LOGIN */

onAuthStateChanged(auth,user=>{

if(!user){
location.href="login.html";
return;
}

currentUser=user;

listenPrescriptions();

});

/* LOGOUT */

document.getElementById("logoutBtn").onclick=()=>{
signOut(auth);
location.href="login.html";
};

/* LISTEN RX */

function listenPrescriptions(){

const q=query(
collection(db,"prescriptions"),
where("assignedPharmacyUid","==",auth.currentUser.uid),
where("status","==","sent")
);

onSnapshot(q,snap=>{

const list=document.getElementById("rxList");
list.innerHTML="";

snap.forEach(docu=>{

const d=docu.data();

const div=document.createElement("div");

div.className="rx";

div.innerHTML=
`<b>${d.code}</b> - ${d.createdAt?.toDate().toLocaleTimeString()}`;

div.onclick=()=>{
showDetails(docu.id,d);
};

list.appendChild(div);

});

});

}

/* SHOW DETAILS */

function showDetails(id,data){

currentPrescription=id;

let meds="";

(data.medications||[]).forEach(m=>{

meds+=`
<div class="med">
<b>${m.name}</b><br>
${m.dosage} — ${m.posology} — ${m.duration}
</div>
`;

});

document.getElementById("detailsContent").innerHTML=`

<b>Code :</b> ${data.code}<br><br>

<b>Patient :</b><br>
${data.patientName || ""}<br><br>

<b>Médecin :</b><br>
Dr ${data.doctorName || ""}<br><br>

<b>Prescription</b><br>
${meds}

<br>

<button class="btn-green" id="dispenseBtn">
Délivrer
</button>

<button class="btn-red" id="rejectBtn">
Refuser
</button>

<button class="btn-gray" id="unavailableBtn">
Indisponible
</button>

`;

document.getElementById("dispenseBtn").onclick=()=>dispense();
document.getElementById("rejectBtn").onclick=()=>reject();
document.getElementById("unavailableBtn").onclick=()=>unavailable();

}

/* ACTIONS */

async function dispense(){

await updateDoc(
doc(db,"prescriptions",currentPrescription),
{
status:"dispensed",
dispensedAt:serverTimestamp(),
used:true
});

archive();

}

async function reject(){

await updateDoc(
doc(db,"prescriptions",currentPrescription),
{
status:"rejected"
});

archive();

}

async function unavailable(){

await updateDoc(
doc(db,"prescriptions",currentPrescription),
{
status:"unavailable"
});

archive();

}

/* ARCHIVE AUTO */

function archive(){

document.getElementById("detailsContent").innerHTML=
"Ordonnance traitée";

}

</script>

</body>
</html>
